  return TEAM_NAME_MAP[eng] || eng;

var _autoUpdateTimer = null;
var _lastUpdateTime = 0;

async function fetchAndUpdateBracketResults(silent) {
  try {
    const knockoutStages = ["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINAL","ROUND_OF_32","ROUND_OF_16"];
    const apiUrl = "https://corsproxy.io/?" + encodeURIComponent("https://api.football-data.org/v4/competitions/2000/matches");
    const res = await fetch(apiUrl, { headers: { "X-Auth-Token": FOOTBALL_API_KEY } });
    if (!res.ok) return 0;
    const data = await res.json();
    if (!data.matches) return 0;

    var updated = 0;
    var allMatches = getAllBuiltMatches();

    data.matches
      .filter(function(m){ return knockoutStages.indexOf(m.stage) >= 0 && m.status === "FINISHED"; })
      .forEach(function(match) {
        var homeKr = koreanTeamName(match.homeTeam.name);
        var awayKr = koreanTeamName(match.awayTeam.name);
        var bm = allMatches.find(function(m){
          return (m.home===homeKr&&m.away===awayKr)||(m.home===awayKr&&m.away===homeKr);
        });
        if (!bm) return;
        if (state.bracketResults[bm.id]) return;

        var score = match.score;
        var homeGoals = score.fullTime.home || 0;
        var awayGoals = score.fullTime.away || 0;
        if (score.extraTime && score.extraTime.home !== null) {
          homeGoals = score.extraTime.home;
          awayGoals = score.extraTime.away;
        }
        if (score.penalties && score.penalties.home !== null) {
          homeGoals = score.penalties.home;
          awayGoals = score.penalties.away;
        }
        var winner = homeGoals > awayGoals
          ? (bm.home === homeKr ? bm.home : bm.away)
          : (bm.away === awayKr ? bm.away : bm.home);
        setBracketResult(bm.id, winner);
        updated++;
      });

    _lastUpdateTime = Date.now();
    return updated;
  } catch(e) {
    console.warn("API 오류:", e.message);
    return 0;
  }
}

function getAllBuiltMatches() {
  var results = state.bracketResults || {};
  var r32 = DEFAULT_BRACKET_MATCHES;
  function nextRound(prev, rid) {
    var out = [];
    for (var i = 0; i < prev.length; i += 2) {
      var a = prev[i], b = prev[i+1];
      out.push({ id: rid+'_'+(i/2+1), round: rid,
        home: results[a.id] || '',
        away: results[b.id] || '' });
    }
    return out;
  }
  var r16 = nextRound(r32,'r16');
  var r8  = nextRound(r16,'r8');
  var r4  = nextRound(r8,'r4');
  var rf  = nextRound(r4,'rf');
  return r32.concat(r16).concat(r8).concat(r4).concat(rf);
}

function startAutoUpdate() {
  // Run immediately on start
  fetchAndUpdateBracketResults(true);

  // Then poll every 5 minutes
  if (_autoUpdateTimer) clearInterval(_autoUpdateTimer);
  _autoUpdateTimer = setInterval(function() {
    fetchAndUpdateBracketResults(true);
  }, 5 * 60 * 1000); // 5분
}

// ── Subscriptions ─────────────────────────────────────────────────
// Only re-render from snapshots when NOT in bracket tab (bracket manages itself)
function snapshotRender() {
  if (state.tab === 'bracket') return; // bracket tab self-manages via draftPicks
  render();
}

function subscribe() {
  onSnapshot(query(collection(db,'matches'), orderBy('date')), s => {
    state.matches = s.docs.map(d => d.data());
    snapshotRender();
  });
  onSnapshot(collection(db,'scorebets'), s => {
    state.scoreBets = s.docs.map(d => d.data());
    snapshotRender();
  });
  onSnapshot(collection(db,'firstgoalbets'), s => {
    state.fgBets = s.docs.map(d => d.data());
    snapshotRender();
  });
  onSnapshot(collection(db,'users'), s => {
    state.users = s.docs.map(d => d.data());
    snapshotRender();
  });
  onSnapshot(collection(db,'bracketpicks'), s => {
    var map = {};
    s.docs.forEach(function(d) {
      var data = d.data();
      map[data.userId] = data;
    });
    state.brackets = map;
    // For bracket tab: only re-render if submitted status changed
    if (state.tab === 'bracket') {
      var myDoc = state.brackets[state.user && state.user.id] || {};
      if (myDoc.submitted) render(); // submitted -> show locked view
    } else {
      render();
    }
  });
  onSnapshot(collection(db,'bracketresults'), s => {
    var map = {};
    s.docs.forEach(function(d) { map[d.data().matchId] = d.data().winner; });
    state.bracketResults = map;
    render(); // always re-render when results come in
  });
  onSnapshot(collection(db,'payments'), s => {
    var map = {};
    s.docs.forEach(function(d) {
      var data = d.data();
      if (!map[data.userId]) map[data.userId] = {};
      map[data.userId][data.matchId] = data.paid;
    });
    state.payments = map;
    snapshotRender();
  });
}

function renderMatch(m) {
  const mSBets  = state.scoreBets.filter(b => b.matchId === m.id);
  const mFgBets = state.fgBets.filter(b => b.matchId === m.id);
  const scorePool = mSBets.length * 10;
  const fgPool    = mFgBets.length * 5;
  const myFg      = mFgBets.find(b => b.userId === state.user.id);
  const isAdmin   = state.user.name === ADMIN_NAME;

  const pillClass = m.status==='live' ? 'pill-live' : m.status==='done' ? 'pill-done' : 'pill-up';
  const pillText  = m.status==='live' ? '🔴 LIVE' : m.status==='done' ? '종료' : '예정';

  // Score grid 5x5
  let grid = `
    <div class="section-title">스코어 그리드 · 블록당 $10</div>
    <div class="grid-wrap">
      <div class="grid-label-row">
        <div class="grid-corner">🇰🇷 \\ ${m.flag}</div>
        ${[0,1,2,3,4].map(a=>`<div class="grid-label">${m.flag}${a}</div>`).join('')}
      </div>
      ${[0,1,2,3,4].map(home => `
        <div class="grid-row">
          <div class="grid-row-label">🇰🇷${home}</div>
          ${[0,1,2,3,4].map(away => {
            const cellBets = mSBets.filter(b => b.home===home && b.away===away);
            const isMine   = cellBets.some(b => b.userId===state.user.id);
            const isWon    = m.status==='done' && m.homeScore===home && m.awayScore===away;
            const isLocked = m.status==='live' || m.status==='done';
            const names    = cellBets.map(b=>b.userName).join(', ');
            let cls = 'cell';
            if (isMine) cls += ' mine';
            else if (cellBets.length > 0) cls += ' taken';
            if (isWon) cls += ' won';
            if (isLocked) cls += ' disabled';
            if (m.status==='live') cls += ' locked';
            const payout = isWon && cellBets.length > 0 ? `<div class="cell-win">+$${Math.floor(scorePool/cellBets.length)}</div>` : '';
            return `<div class="${cls}" data-match="${m.id}" data-home="${home}" data-away="${away}" data-locked="${m.status==='live'?'1':'0'}">
              <div class="cell-score">${home}-${away}</div>
              <div class="cell-names">${names || (!isLocked ? '<span class="cell-price">$10</span>' : '')}</div>
              ${payout}
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>`;

  // First goal
  let fg = `
    <div class="section-title">첫 골 선수 · $5</div>
    <div class="pool-row"><span>첫 골 풀</span><span class="pool-val">$${fgPool} (${mFgBets.length}명)</span></div>
    <div class="fg-grid">
      ${PLAYERS.map(player => {
        const pBets = mFgBets.filter(b => b.player===player);
        const isMine = myFg?.player === player;
        const isWon  = m.status==='done' && m.firstGoalPlayer===player;
        const isDone = m.status==='done';
        let cls = 'fg-btn';
        if (isMine) cls += ' mine';
        if (isDone && !isWon) cls += ' disabled';
        if (isWon) cls += ' won';
        const payout = isWon && pBets.length > 0 ? `<div class="fg-win">+$${Math.floor(fgPool/pBets.length)} 🎉</div>` : '';
        return `<div class="${cls}" data-match="${m.id}" data-player="${player}">
          <div class="fg-name">${player}</div>
          <div class="fg-bets">${pBets.length > 0 ? pBets.map(b=>b.userName).join(', ') : '<span class="fg-price">$5</span>'}</div>
          ${payout}
        </div>`;
      }).join('')}
    </div>`;

  // Admin panel
  let admin = '';
  if (isAdmin && m.status !== 'done') {
    admin = `
    <div class="admin-panel">
      <div class="admin-title">⚙️ 경기 결과 입력 (관리자)</div>
      <div class="admin-row">
        <span class="admin-label">한국</span>
        <input class="mini-input" id="ah_${m.id}" type="number" min="0" placeholder="0">
        <span class="admin-label">:</span>
        <input class="mini-input" id="aa_${m.id}" type="number" min="0" placeholder="0">
        <span class="admin-label">${m.opponent}</span>
      </div>
      <div class="admin-row">
        <span class="admin-label">첫 골</span>

  const banner = m.status==='done' ? `
    <div class="result-banner">
      최종: 한국 ${m.homeScore} - ${m.awayScore} ${m.opponent} · 첫 골: ${m.firstGoalPlayer||'없음'}

    <div class="lock-banner">
      🔒 경기 시작! 베팅 선택 변경이 불가합니다
    </div>` : '';

  return `

    <div class="match-header">
      <div>
        <div class="match-title">${m.label} · 🇰🇷 vs ${m.flag}</div>

      <span class="team-flag">🇰🇷</span>
      ${m.homeScore !== null
        ? `<div class="score-big ${m.status==='live'?'live':''}">${m.homeScore} : ${m.awayScore}</div>`
        : `<div class="vs-text">VS</div>`}
      <span class="team-flag">${m.flag}</span>
    </div>
    ${banner}
    <div class="pool-row">
      <span>스코어 풀</span>
      <span class="pool-val">$${scorePool} (${mSBets.length}베팅)</span>
    </div>
    ${admin}
    ${grid}
    ${fg}
  </div>`;
}


function renderBracket() {
  try {
    var isAdmin  = state.user.name === ADMIN_NAME;
    var myDoc    = state.brackets[state.user.id] || {};
    var myPicks  = myDoc.picks || {};
    var submitted = !!myDoc.submitted;
    var results  = state.bracketResults || {};

    // On first load, seed draftPicks from saved picks
    if (!submitted && Object.keys(draftPicks).length === 0 && Object.keys(myPicks).length > 0) {
      draftPicks = JSON.parse(JSON.stringify(myPicks));
    }
    var ap = submitted ? myPicks : draftPicks; // active picks

    // Build rounds
    var r32 = DEFAULT_BRACKET_MATCHES;
    function nextRound(prev, rid) {
      var out = [];
      for (var i = 0; i < prev.length; i += 2) {
        var a = prev[i], b = prev[i+1];
        out.push({ id: rid+'_'+(i/2+1), round: rid,
          home: results[a.id] || ap[a.id] || '?',
          away: results[b.id] || ap[b.id] || '?',
          date: '' });
      }
      return out;
    }
    var r16 = nextRound(r32,'r16'), r8 = nextRound(r16,'r8');
    var r4  = nextRound(r8,'r4'),   rf = nextRound(r4,'rf');
    var rounds = [
      {id:'r32',label:'32강',pts:2,ms:r32},
      {id:'r16',label:'16강',pts:4,ms:r16},
      {id:'r8', label:'8강', pts:6,ms:r8},
      {id:'r4', label:'4강', pts:8,ms:r4},
      {id:'rf', label:'결승',pts:10,ms:rf},
    ];

    // Score
    var score = 0;
    rounds.forEach(function(r){ r.ms.forEach(function(m){
      if(ap[m.id] && results[m.id] && ap[m.id]===results[m.id]) score+=r.pts;
    });});

    var subCount = Object.values(state.brackets).filter(function(b){return b.submitted;}).length;
    var totalSlots = r32.length+r16.length+r8.length+r4.length+rf.length;
    var filled = Object.keys(ap).length;

    var locked = isBracketLocked();
    var html = '<div class="bracket-hero">'
      +'<div class="bh-left"><div class="bh-title">브래킷 챌린지</div>'
      +'<div class="bh-sub">'+(locked?'🔒 선택 마감 (첫 경기 시작)':'⏰ 마감: 6/29 1PM ET 전까지 변경 가능')+'</div></div>'
      +'<div class="bh-right"><div class="bh-pool">$'+TOTAL_POT+'</div>'
      +'<div class="bh-pool-label">1위 $'+Math.floor(TOTAL_POT*.5)+' · 2위 $'+Math.floor(TOTAL_POT*.3)+' · 3위 $'+Math.floor(TOTAL_POT*.2)+'</div></div></div>';

    if (submitted) {
      html += '<div class="score-chip">내 점수: <strong>'+score+'점</strong> · <span style="color:#5dc882">✓ 제출완료</span></div>';
    } else if (locked) {
      html += '<div class="score-chip" style="background:rgba(224,85,85,.1);border-color:rgba(224,85,85,.3);color:#e05555">'

            if (doc.picks[m.id] === m.home) hPickers.push(uname);
            if (doc.picks[m.id] === m.away) aPickers.push(uname);
          });

        // Styles

        var aNameColor = pick===m.away&&!aUnk ? 'color:#FFD700;font-weight:700;' : result===m.away ? 'color:#5dc882;font-weight:700;' : '';

            +(result?'<span class="bm-result-label">✓ '+result+' 승</span>':'')

          +(pick===m.home&&!hUnk ? '<div style="font-size:10px;color:#FFD700;font-weight:700;margin-bottom:3px">✓ 내 선택</div>' : '')

          +'</div>'
          +'<div class="bm-vs">VS</div>'
          // Away
          +'<div class="bm-team" data-bpick="'+m.id+'" data-team="'+m.away+'" style="'+aStyle+'">'
          +(pick===m.away&&!aUnk ? '<div style="font-size:10px;color:#FFD700;font-weight:700;margin-bottom:3px">✓ 내 선택</div>' : '')
          +'<div class="bm-name" style="'+aNameColor+'">'+m.away+'</div>'
          +(showOthers && aPickers.length>0 ? '<div style="font-size:9px;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.4">'+aPickers.join(', ')+'</div>' : '')
          +(result===m.away ? '<div class="bm-result-tag">✓ 승</div>' : '')
          +(pick===m.away&&result===m.away ? '<div class="bm-score-tag">+'+r.pts+'점 🎉</div>' : '')
          +'</div>'
          +'</div></div>';
      });
    });

    // Submit btn
    if (!submitted && !locked) {
      html += '<div style="margin-top:20px;padding:0 2px">'
        +'<button class="auth-btn" id="submitBracketBtn" '+(filled>=totalSlots?'':'disabled style="opacity:.4;cursor:not-allowed"')+'>'
        +(filled>=totalSlots ? '✅ 브래킷 제출 (변경불가)' : '모든 경기 선택 후 제출 가능 ('+filled+'/'+totalSlots+')')
        +'</button></div>';
    } else if (!submitted && locked) {
      html += '<div style="margin-top:20px;padding:14px;background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:10px;text-align:center;font-size:13px;color:#e05555">'
        +'🔒 첫 경기가 시작되어 제출이 마감되었습니다</div>';
    }

    return html;
  } catch(e) {
    console.error('bracket error:', e);
    return '<div class="empty">오류: '+e.message+'</div>';
  }
}





function renderTree() {
  var results   = state.bracketResults || {};
  var myDoc     = state.brackets[state.user.id] || {};
  var myPicks   = (myDoc.submitted ? myDoc.picks : draftPicks) || {};
  var showOthers = isBracketLocked();

  // ── Build rounds ─────────────────────────────────────────────
  var r32 = DEFAULT_BRACKET_MATCHES;
  function nextRound(prev, rid) {
    var out = [];
    for (var i = 0; i < prev.length; i += 2) {
      var a = prev[i], b = prev[i+1];
      out.push({ id: rid+'_'+(i/2+1), round: rid,
        home: results[a.id] || myPicks[a.id] || '?',
        away: results[b.id] || myPicks[b.id] || '?' });
    }
    return out;
  }
  var r16 = nextRound(r32,'r16');
  var r8  = nextRound(r16,'r8');
  var r4  = nextRound(r8,'r4');
  var rf  = nextRound(r4,'rf');

  // ── Layout constants ─────────────────────────────────────────
  var TH = 34;          // team row height
  var MH = TH*2 + 1;   // match box height (2 rows + divider) = 69
  var BASE_GAP = 8;     // gap between matches in r32

  // Gap between matches in round ri
  function colGap(ri) {
    if (ri === 0) return BASE_GAP;
    return (MH + BASE_GAP) * Math.pow(2, ri) - MH;
  }
  // Top padding before first match in round ri (centers the column)
  function topPad(ri) {
    if (ri === 0) return 0;
    return Math.floor(colGap(ri) / 2);
  }
  // Y center of match i in round ri
  function matchCY(ri, i) {
    return topPad(ri) + i * (MH + colGap(ri)) + Math.floor(MH / 2);
  }

  // Total content height (all rounds share same height)
  var TOTAL_H = topPad(0) + 16 * (MH + BASE_GAP) - BASE_GAP; // ~1288

  // ── Helpers ──────────────────────────────────────────────────
  function getPickers(matchId, team) {
    if (!showOthers || !team || team==='?') return [];
    return Object.entries(state.brackets)
      .filter(function(e){ return e[1]&&e[1].submitted&&e[1].picks&&e[1].picks[matchId]===team; })
      .map(function(e){ var u=state.users.find(function(u){return u.id===e[0];}); return u?u.name:e[0]; });
  }

  function teamStyle(matchId, team) {
    var result = results[matchId]||'', myPick = myPicks[matchId]||'';
    var unknown = !team||team==='?';
    var won  = !unknown&&result&&result===team;
    var lost = !unknown&&result&&result!==team;
    var pickers = getPickers(matchId, team);
    var mine = !unknown && (myPick===team || pickers.indexOf(state.user.name)>=0);
    if (won)   return {bg:'rgba(93,200,130,.22)',nc:'#5dc882',icon:'✓'};
    if (lost)  return {bg:'rgba(0,0,0,.25)',nc:'rgba(255,255,255,.28)',icon:''};
    if (mine)  return {bg:'rgba(255,215,0,.18)',nc:'#FFD700',icon:'★'};
    if (unknown) return {bg:'rgba(255,255,255,.03)',nc:'rgba(255,255,255,.2)',icon:''};
    return {bg:'#1A2940',nc:'#fff',icon:''};
  }

  function teamRow(matchId, team, isTop) {
    var s = teamStyle(matchId, team);
    var name = (!team||team==='?') ? '?' : team;
    var pickers = getPickers(matchId, team);
    var pHtml = '';
    if (showOthers && pickers.length) {
      pHtml = '<span style="font-size:7.5px;color:rgba(255,255,255,.38);margin-left:3px">('
        + pickers.map(function(n){ return n===state.user.name?'<b style="color:#FFD700">'+n+'</b>':n; }).join(',')
        + ')</span>';
    }
    var liveScore = '';
    return '<div style="height:'+TH+'px;display:flex;align-items:center;padding:0 8px;'
      +'background:'+s.bg+';'+(isTop?'border-radius:6px 6px 0 0':'border-radius:0 0 6px 6px')+';">'
      +'<span style="font-size:11px;font-weight:600;color:'+s.nc+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68px">'+name+'</span>'
      +(s.icon?'<span style="font-size:9px;color:'+s.nc+';margin-left:3px">'+s.icon+'</span>':'')
      +pHtml
      +liveScore
      +'</div>';
  }

  function matchBox(m) {
    return '<div style="width:110px;border:1px solid rgba(255,255,255,.13);border-radius:7px;overflow:hidden;flex-shrink:0">'
      +teamRow(m.id, m.home, true)
      +'<div style="height:1px;background:rgba(255,255,255,.1)"></div>'
      +teamRow(m.id, m.away, false)
      +'</div>';
  }

  // ── Build HTML ────────────────────────────────────────────────
  var rounds = [
    {label:'32강',pts:2, ms:r32, ri:0},
    {label:'16강',pts:4, ms:r16, ri:1},
    {label:'8강', pts:6, ms:r8,  ri:2},
    {label:'4강', pts:8, ms:r4,  ri:3},
    {label:'결승',pts:10,ms:rf,  ri:4},
  ];

  var html = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px">'
    +'<div style="display:flex;align-items:flex-start;min-width:max-content;gap:0;padding:4px 2px 4px">';

  rounds.forEach(function(r) {
    var ri = r.ri;
    var tp = topPad(ri);
    var gp = colGap(ri);

    // Column of matches
    html += '<div style="display:flex;flex-direction:column">'
      // Round header
      +'<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-align:center;'
      +'padding:3px 0 7px;width:110px;letter-spacing:.4px">'
      +r.label+' <span style="color:rgba(255,255,255,.2)">'+r.pts+'pt</span></div>'
      // Match stack with top padding
      +'<div style="padding-top:'+tp+'px;display:flex;flex-direction:column;gap:'+gp+'px">';

    r.ms.forEach(function(m) { html += matchBox(m); });

    html += '</div></div>'; // end column

    // SVG connector between this round and next
    if (ri < 4) {
      var n    = r.ms.length;   // number of matches this round
      var SVG_H = TOTAL_H + 28; // +28 for header

      html += '<div style="flex-shrink:0;width:20px">'
        +'<div style="height:28px"></div>' // align with header
        +'<svg width="20" height="'+TOTAL_H+'" xmlns="http://www.w3.org/2000/svg">';

      for (var i = 0; i < n/2; i++) {
        // Two source matches → one destination match
        var y1 = matchCY(ri, i*2);       // center of top source
        var y2 = matchCY(ri, i*2+1);     // center of bottom source
        var yd = matchCY(ri+1, i);       // center of destination
        var mid = (y1+y2)/2;

        // Horizontal from source to midpoint
        html += '<line x1="0" y1="'+y1+'" x2="10" y2="'+y1+'" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>';
        html += '<line x1="0" y1="'+y2+'" x2="10" y2="'+y2+'" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>';
        // Vertical connecting the two
        html += '<line x1="10" y1="'+y1+'" x2="10" y2="'+y2+'" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>';
        // Horizontal to next column
        html += '<line x1="10" y1="'+yd+'" x2="20" y2="'+yd+'" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>';
      }

      html += '</svg></div>';
    }
  });

  // Champion
  var champ = results['rf_1'] || myPicks['rf_1'] || '';
  var cy = matchCY(4, 0);
  html += '<div style="flex-shrink:0;padding-top:'+(cy - 30 + 28)+'px;padding-left:4px">'
    +'<div style="background:rgba(255,215,0,.15);border:2px solid #FFD700;border-radius:10px;'
    +'padding:8px 10px;text-align:center;width:72px">'
    +'<div style="font-size:20px">🏆</div>'
    +'<div style="font-size:11px;font-weight:700;color:#FFD700;margin-top:3px">'+(champ||'?')+'</div>'
    +'</div></div>';

  html += '</div></div>';

  // Legend
  html += '<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:rgba(255,255,255,.4)">'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(93,200,130,.3);border:1px solid #5dc882;display:inline-block"></span>실제승리</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(255,215,0,.2);border:1px solid #FFD700;display:inline-block"></span>내픽 ★</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(0,0,0,.3);display:inline-block"></span>탈락</span>'
    +'</div>';

  return html;
}

function renderRank() {
  var COLORS = ['#F5A623','#5dc882','#6b8ff5','#e05555','#c47cf5','#5bc8d4'];
  var results = state.bracketResults || {};
  var PRIZE_RATES = [0.5, 0.3, 0.2];
  var MEDALS = ['🥇','🥈','🥉'];
  var MEDAL_COLORS = ['#FFD700','#ccc','#cd7f32'];

  // Calc score per user
  var leaderboard = Object.entries(state.brackets)
    .filter(function(e){ return e[1] && e[1].submitted; })
    .map(function(e) {
      var uid = e[0], doc = e[1], picks = doc.picks || {};
      var score = 0, hits = 0;
      DEFAULT_BRACKET_MATCHES.forEach(function(m){
        if (picks[m.id] && results[m.id] && picks[m.id]===results[m.id]) { score+=2; hits++; }
      });
      [['r16',4],['r8',6],['r4',8],['rf',10]].forEach(function(rp){
        Object.keys(picks).filter(function(k){return k.startsWith(rp[0]+'_');}).forEach(function(k){
          if (picks[k] && results[k] && picks[k]===results[k]) { score+=rp[1]; hits++; }
        });
      });
      var u = state.users.find(function(u){return u.id===uid;}) || {name:uid,id:uid};
      return {id:uid, name:u.name, score:score, hits:hits};
    })
    .sort(function(a,b){ return b.score - a.score; });

  // Assign ranks with tie handling
  // rank 0,1,2 = top 3 prize positions
  // Ties share the combined prize of tied positions
  function assignPrizes(lb) {
    if (!lb.length) return lb;
    var result = lb.map(function(u){ return Object.assign({}, u, {prize:0, rankLabel:'', tied:false}); });
    var i = 0;
    while (i < result.length) {
      // Find all with same score
      var j = i;
      while (j < result.length && result[j].score === result[i].score) j++;
      var tiedCount = j - i;
      var tiedPositions = [];
      for (var k = i; k < j && k < 3; k++) tiedPositions.push(k);

      if (tiedPositions.length > 0) {
        // Sum up prizes for tied positions and split
        var totalPrize = 0;
        tiedPositions.forEach(function(p){ totalPrize += Math.floor(TOTAL_POT * PRIZE_RATES[p]); });
        var splitPrize = Math.floor(totalPrize / tiedPositions.length);
        for (var k = i; k < j; k++) {
          if (k < 3 && result[k].score > 0) {
            result[k].prize = splitPrize;
            result[k].rankLabel = tiedCount > 1 && tiedPositions.length > 0
              ? MEDALS[tiedPositions[0]] + (tiedPositions.length > 1 ? '~' + MEDALS[tiedPositions[tiedPositions.length-1]] : '')
              : MEDALS[tiedPositions[0]];
            result[k].rankColor = MEDAL_COLORS[tiedPositions[0]];
            result[k].tied = tiedCount > 1 && tiedPositions.length > 0;
          }
        }
      }
      i = j;
    }
    return result;
  }

  var ranked = assignPrizes(leaderboard);

  var notSubmitted = state.users.filter(function(u){
    return !state.brackets[u.id] || !state.brackets[u.id].submitted;
  });

  var html = '';

  // Prize pool card
  html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center">'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">상금 풀</div>'
    + '<div style="font-size:42px;font-weight:700;color:var(--gold)">$'+TOTAL_POT+'</div>'
    + '<div style="display:flex;justify-content:center;gap:16px;margin-top:10px">'
    + PRIZE_RATES.map(function(r,i){
        return '<div style="text-align:center">'
          +'<div style="font-size:20px">'+MEDALS[i]+'</div>'
          +'<div style="font-size:13px;font-weight:700;color:'+MEDAL_COLORS[i]+'">$'+Math.floor(TOTAL_POT*r)+'</div>'
          +'<div style="font-size:10px;color:var(--muted)">'+(i===0?'1위 50%':i===1?'2위 30%':'3위 20%')+'</div>'
          +'</div>';
      }).join('')
    + '</div></div>';

  html += '<div class="section-title" style="margin-top:0">브래킷 리더보드</div>';

  if (!ranked.length) {
    html += '<div class="empty">아직 제출한 참가자가 없어요</div>';
  } else {
    // Group by score for rank display
    var displayRank = 0, prevScore = -1, sameCount = 0;
    ranked.forEach(function(u, i) {
      if (u.score !== prevScore) { displayRank = i+1; sameCount = 0; }
      sameCount++;
      prevScore = u.score;
      var isMe = u.id === state.user.id;

      // Hits count by round
      var hitsTotal = u.hits;

      html += '<div class="rank-row '+(isMe?'me':'')+'">'
        + '<div class="rank-num '+(u.prize>0?'top':'')+'">'+displayRank+(u.tied?'=':'')+'</div>'
        + '<div class="avatar" style="background:'+COLORS[i%COLORS.length]+';color:#0D1B2A">'+u.name[0]+'</div>'
        + '<div class="rank-info">'
        + '<div class="rank-name">'+u.name+(isMe?' (나)':'')+'</div>'
        + '<div class="rank-sub">적중 '+hitsTotal+'게임 · '+u.score+'점</div>'
        + '</div>'
        + '<div style="text-align:right;min-width:70px">'
        + (u.prize > 0
            ? '<div style="font-size:13px;font-weight:700;color:'+(u.rankColor||'#FFD700')+'">'
              +(u.tied?'(타이) ':'')+u.rankLabel+'</div>'
              +'<div style="font-size:13px;font-weight:700;color:'+(u.rankColor||'#FFD700')+'">$'+u.prize+'</div>'
            : '<div style="font-size:11px;color:var(--muted)">—</div>')
        + '</div>'
        + '</div>';
    });
  }

  if (notSubmitted.length > 0) {
    html += '<div class="section-title" style="margin-top:16px">미제출</div>';
    notSubmitted.forEach(function(u) {
      html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;'
        +'padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px;opacity:.5">'
        +'<div style="font-size:13px">'+u.name+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-left:auto">미제출</div>'
        +'</div>';
    });
  }

  return html;
}

function renderConfirmModal() {
  const c = state.confirm;

// Save entire bracket as one doc per user
async function submitBracket(picks) {
  await setDoc(doc(db, 'bracketpicks', state.user.id), {
    userId: state.user.id, userName: state.user.name,
    picks: picks, submitted: true, updatedAt: serverTimestamp()
  });
}

async function setBracketResult(matchId, winner) {
  await setDoc(doc(db, 'bracketresults', matchId), { matchId, winner, updatedAt: serverTimestamp() });
}

async function resetCollection(colName) {
  var snap = await getDocs(collection(db, colName));
  var batch = writeBatch(db);
  snap.docs.forEach(function(d){ batch.delete(d.ref); });
  await batch.commit();
}

async function resetBracketMatches() {
  await resetCollection('bracketpicks');
  await resetCollection('bracketresults');
}

async function resetBracketPicks() {
  await resetCollection('bracketpicks');
  draftPicks = {};
}

// ── Lock warning ──────────────────────────────────────────────────

function showLockWarning() {
  const el = document.getElementById('lockWarning');
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Events ────────────────────────────────────────────────────────
function attachEvents() {
  // Login
  const enterBtn = document.getElementById('enterBtn');
  if (enterBtn) {
    enterBtn.onclick = doLogin;
    document.getElementById('nameInput')?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  }

  // Logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('korbet_user');
    state.user = null; draftPicks = {}; render();
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => { state.tab = el.dataset.tab; render(); });
  });

  // Score grid cells
  document.querySelectorAll('.cell:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.locked === '1') { showLockWarning(); return; }
      const matchId = el.dataset.match;
      const home = parseInt(el.dataset.home);
      const away = parseInt(el.dataset.away);
      const m = state.matches.find(x => x.id===matchId);
      const isMine = state.scoreBets.some(b => b.matchId===matchId && b.userId===state.user.id && b.home===home && b.away===away);
      state.confirm = { type: isMine?'remove':'place', matchId, home, away, awayLabel: m?.flag||'' };
      render();
    });
  });

  // First goal buttons
  document.querySelectorAll('.fg-btn:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.locked === '1') { showLockWarning(); return; }
      const matchId = el.dataset.match;
      const player  = el.dataset.player;
      placeFgBet(matchId, player).catch(console.error);
    });
  });

  // Bracket picks (draft mode - update local state immediately)
  document.querySelectorAll('[data-bpick]').forEach(function(el) {
    el.addEventListener('click', function() {
      var matchId = el.dataset.bpick;
      var team    = el.dataset.team;
      if (!team || team === '?') return;
      var myDoc = state.brackets[state.user.id] || {};
      if (myDoc.submitted) return;
      if (!draftPicks) draftPicks = {};

      // Clear all downstream picks when this pick changes
      var oldPick = draftPicks[matchId];
      if (oldPick && oldPick !== team) {
        // Simple: remove any pick that has the old team as its value
        // in later rounds - easiest to just rebuild from scratch
        Object.keys(draftPicks).forEach(function(key) {
          if (key !== matchId && draftPicks[key] === oldPick) {
            delete draftPicks[key];
          }
        });
      }
      draftPicks[matchId] = team;
      render();
    });
  });

  // Submit bracket
  document.getElementById('submitBracketBtn')?.addEventListener('click', function() {
    if (!confirm('브래킷을 제출할까요? 제출 후에는 변경할 수 없습니다.')) return;
    var btn = document.getElementById('submitBracketBtn');
    btn.textContent = '제출 중...'; btn.disabled = true;
    submitBracket(draftPicks).catch(function(e){
      alert('오류: ' + e.message);
      btn.textContent = '✅ 브래킷 제출'; btn.disabled = false;
    });
  });

  // Bracket results (admin)
  document.querySelectorAll('[data-bresult]').forEach(function(el) {
    el.addEventListener('click', function() {
      var matchId = el.dataset.bresult;
      var winner  = el.dataset.bwinner;
      if (winner === '?') return;
      if (confirm(winner + ' 승리로 확정할까요?')) {
        setBracketResult(matchId, winner).catch(console.error);
      }
    });
  });

  // Reset buttons
  document.getElementById('autoUpdateBtn')?.addEventListener('click', async function() {
    this.textContent = '불러오는 중...';
    this.disabled = true;
    await fetchAndUpdateBracketResults();
    this.textContent = '🔄 지금 결과 업데이트';
    this.disabled = false;
  });

  document.getElementById('resetMatchesBtn')?.addEventListener('click', async function() {
    if (!confirm('모든 픽과 결과를 초기화할까요?')) return;
    document.getElementById('resetMatchesBtn').textContent = '초기화 중...';
    await resetBracketMatches();
    draftPicks = {};
  });
  document.getElementById('resetPicksBtn')?.addEventListener('click', async function() {
    if (!confirm('모든 픽을 초기화할까요?')) return;
    document.getElementById('resetPicksBtn').textContent = '초기화 중...';
    await resetBracketPicks();
    draftPicks = {};
  });

  // Admin result buttons
  document.querySelectorAll('[data-admin]').forEach(el => {
    el.addEventListener('click', () => {
      const matchId = el.dataset.admin;
      const h  = parseInt(document.getElementById(`ah_${matchId}`)?.value||'');
      const a  = parseInt(document.getElementById(`aa_${matchId}`)?.value||'');
      const fg = document.getElementById(`afg_${matchId}`)?.value||'';
      if (isNaN(h)||isNaN(a)||!fg) { alert('스코어와 첫 골 선수를 모두 입력하세요'); return; }
      setMatchResult(matchId, h, a, fg).catch(console.error);
    });
  });

  // Confirm modal
  document.getElementById('modalCancel')?.addEventListener('click', () => { state.confirm=null; render(); });
  document.getElementById('overlayBg')?.addEventListener('click', e => { if(e.target.id==='overlayBg'){ state.confirm=null; render(); } });
  // Payment toggle (admin only)
  document.querySelectorAll('.pay-btn').forEach(el => {
    el.addEventListener('click', async () => {
      const uid = el.dataset.uid;
      const mid = el.dataset.mid;
      const isPaid = el.classList.contains('paid');
      await setPayment(uid, mid, !isPaid);
    });
  });

  document.getElementById('modalConfirm')?.addEventListener('click', async () => {
    const c = state.confirm;
    if (!c) return;
    document.getElementById('modalConfirm').textContent = '처리 중...';
    document.getElementById('modalConfirm').disabled = true;
    try {
      if (c.type==='place') await placeScoreBet(c.matchId, c.home, c.away);
      else await removeScoreBet(c.matchId, c.home, c.away);
    } finally { state.confirm=null; render(); }
  });
}

async function doLogin() {
  const name = document.getElementById('nameInput')?.value?.trim();
  if (!name) return;
  document.getElementById('enterBtn').textContent = '입장 중...';
  document.getElementById('enterBtn').disabled = true;
  try {
    const u = await loginOrCreate(name);
    localStorage.setItem('korbet_user', JSON.stringify(u));
    state.user = u;
    subscribe();
    render();
  } catch(e) {
    document.getElementById('authErr').textContent = '연결 오류. 다시 시도해주세요';
    document.getElementById('enterBtn').textContent = '입장하기 →';
    document.getElementById('enterBtn').disabled = false;
  }
}

// ── Boot ──────────────────────────────────────────────────────────
function boot() {
  try {
    const saved = localStorage.getItem('korbet_user');
    if (saved) {
      state.user = JSON.parse(saved);
      subscribe();
    }
  } catch(e) { console.warn('boot error:', e); }
  render();
  // 자동 결과 업데이트 시작 (5분마다)
  startAutoUpdate();
}
boot();
</script>

.modal-actions{display:grid;grid-template-columns:1fr 2fr;gap:10px}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:13px;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-confirm{background:var(--gold);border:none;border-radius:10px;padding:13px;color:#0D1B2A;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}

.empty{text-align:center;padding:32px 20px;color:rgba(255,255,255,.2);font-size:13px}
.bracket-hero{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.bh-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--gold)}
.bh-sub{font-size:11px;color:var(--muted);margin-top:2px}
.bh-pool{font-family:sans-serif,sans-serif;font-size:30px;color:var(--green);letter-spacing:1px;text-align:right}
.bh-pool-label{font-size:10px;color:var(--muted);text-align:right}
.score-chip{display:inline-block;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--gold);margin-bottom:14px}
.score-chip strong{font-size:15px}
.bm-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.bm-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:stretch}
.bm-team{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;transition:all .2s;position:relative}
.bm-team:hover:not([style*="cursor:default"]){border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05)}
.bm-team.picked{border-color:#FFD700!important;background:rgba(255,215,0,.3)!important;}
.bm-team.picked .bm-name{color:#FFD700!important;font-weight:700!important;font-size:15px!important;}
.bm-team.picked .bm-pickcount{color:rgba(255,215,0,.7)!important}
.bm-team.won{border-color:var(--green)}
.bm-team.correct{border-color:var(--green)!important;background:rgba(93,200,130,.2)!important;}
.bm-team.correct .bm-name{color:var(--green)!important;font-weight:700!important;}
.bm-name{font-size:13px;font-weight:600;margin-bottom:4px}
.bm-pickers{font-size:10px;color:var(--muted);line-height:1.4}
.bm-team.picked .bm-pickers{color:var(--gold)}
.bm-result-tag{font-size:10px;color:var(--green);font-weight:600;margin-top:4px}
.bm-score-tag{font-size:10px;color:var(--gold);font-weight:700;margin-top:2px}
.bm-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bm-result-label{font-size:10px;color:var(--green);font-weight:600}
.bm-pickcount{font-size:10px;color:var(--muted);margin-top:2px}
.bm-team.unknown{opacity:.35;cursor:default!important}
.bm-team.unknown .bm-name{font-style:italic}
.bm-matchnum{font-size:10px;color:rgba(255,255,255,.25)}
.bm-date{font-size:11px;color:var(--gold);font-weight:500}
/* Tree bracket */
.tc-col{display:flex;flex-direction:column;min-width:110px}
.tc-round-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-align:center;margin-bottom:6px;text-transform:uppercase}
.tc-match{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.tc-sep{font-size:10px;color:rgba(255,255,255,.1);text-align:center;height:10px;line-height:10px}
.tb-box{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:5px 7px;min-width:100px;position:relative;transition:all .15s}
.tb-box.tb-mine{border-color:#FFD700;background:rgba(255,215,0,.15)}
.tb-box.tb-won{border-color:#5dc882;background:rgba(93,200,130,.15)}
.tb-box.tb-lost{opacity:.35}
.tb-box.tb-unknown{border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.2);text-align:center;padding:8px}
.tb-box.tb-champ{border-color:#FFD700;background:rgba(255,215,0,.2);text-align:center;padding:10px 8px}
.tb-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-box.tb-mine .tb-name{color:#FFD700}
.tb-box.tb-won .tb-name{color:#5dc882;font-weight:700}
.tb-pickers{font-size:9px;margin-top:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-won-tag{position:absolute;top:3px;right:4px;font-size:9px;color:#5dc882;font-weight:700}
.bm-vs{font-family:sans-serif,sans-serif;font-size:18px;color:rgba(255,255,255,.18);display:flex;align-items:center}
.bm-admin-row{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.reset-btn{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:8px;padding:7px 12px;color:#e05555;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.reset-btn:hover{background:rgba(224,85,85,.2)}
.pay-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.lock-banner{background:rgba(255,100,50,.12);border:1px solid rgba(255,100,50,.35);border-radius:10px;padding:9px 13px;margin-bottom:10px;font-size:13px;color:#ff7a50;text-align:center;font-weight:500}
.lock-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;border:1px solid rgba(255,100,50,.5);color:#ff7a50;font-size:13px;font-weight:500;padding:12px 22px;border-radius:30px;z-index:999;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;white-space:nowrap}
.lock-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.pay-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}
.pay-badge.paid{background:rgba(93,200,130,.12);color:#5dc882;border-color:rgba(93,200,130,.3)}
.pay-btn{font-size:10px;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:'Inter',sans-serif;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15);transition:all .2s}
.pay-btn:hover{border-color:var(--gold);color:var(--gold)}
.pay-btn.paid{background:rgba(93,200,130,.12);color:#5dc882;border-color:rgba(93,200,130,.3)}
.pay-btn.paid:hover{background:rgba(224,85,85,.12);color:#e05555;border-color:rgba(224,85,85,.3)}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh">
    <div style="font-family:sans-serif,sans-serif;font-size:40px;color:#F5A623">🇰🇷</div>
  </div>
</div>
</body>
</html>
