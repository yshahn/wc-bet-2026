<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 Korea Bet 2026</title>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot,
  query, orderBy, serverTimestamp, deleteDoc, writeBatch
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── 🔧 Firebase 설정 (본인 값으로 교체) ──────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB3VlbTXCx44_E0lfacYDX-_o5-rgYvA30",
  authDomain:        "wc-bet-2026.firebaseapp.com",
  projectId:         "wc-bet-2026",
  storageBucket:     "wc-bet-2026.firebasestorage.app",
  messagingSenderId: "309225982312",
  appId:             "1:309225982312:web:41a269c70f5aef39612edd",
};
const ADMIN_NAME = "한용수"; // 경기 결과 입력 권한
const BRACKET_ROUNDS = [
  {id:'r32',label:'32강',points:1},
  {id:'r16',label:'16강',points:2},
  {id:'r8', label:'8강', points:3},
  {id:'r4', label:'4강', points:4},
  {id:'rf', label:'결승',points:5},
];
// ─────────────────────────────────────────────────────────────────

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

const PLAYERS = ['손흥민','황희찬','조규성','오현규','이강인','황인범','이재성','설영우'];
const MATCHES = [
  { id:'game2', label:'2차전', opponent:'멕시코',  flag:'🇲🇽', date:'2026-06-22', status:'upcoming', homeScore:null, awayScore:null, firstGoalPlayer:null },
  { id:'game3', label:'3차전', opponent:'남아공',  flag:'🇿🇦', date:'2026-06-26', status:'upcoming', homeScore:null, awayScore:null, firstGoalPlayer:null },
];

// ── State ─────────────────────────────────────────────────────────
let state = {
  user: null,
  matches: [],
  scoreBets: [],
  fgBets: [],
  users: [],
  payments: {}, // { userId: { game2: true/false, game3: true/false } }
  tab: 'bet',
  confirm: null,
  brackets: {},
  bracketResults: {},
  bracketMatches: [],
};

// ── Firebase helpers ──────────────────────────────────────────────
async function initMatches() {
  for (const m of MATCHES) {
    const snap = await getDoc(doc(db, 'matches', m.id));
    if (!snap.exists()) await setDoc(doc(db, 'matches', m.id), m);
  }
}

async function loginOrCreate(name) {
  const id = name.trim().toLowerCase().replace(/\s+/g,'_');
  const ref = doc(db, 'users', id);
  const snap = await getDoc(ref);
  if (!snap.exists()) await setDoc(ref, { id, name: name.trim(), createdAt: serverTimestamp() });
  return { id, name: name.trim() };
}

async function placeScoreBet(matchId, home, away) {
  const id = `${state.user.id}_${matchId}_${home}-${away}`;
  await setDoc(doc(db, 'scorebets', id), {
    id, userId: state.user.id, userName: state.user.name,
    matchId, home, away, amount: 10, createdAt: serverTimestamp()
  });
}

async function removeScoreBet(matchId, home, away) {
  const id = `${state.user.id}_${matchId}_${home}-${away}`;
  await deleteDoc(doc(db, 'scorebets', id));
}

async function placeFgBet(matchId, player) {
  const id = `${state.user.id}_${matchId}_firstgoal`;
  await setDoc(doc(db, 'firstgoalbets', id), {
    id, userId: state.user.id, userName: state.user.name,
    matchId, player, amount: 5, createdAt: serverTimestamp()
  });
}

async function setMatchResult(matchId, homeScore, awayScore, firstGoalPlayer) {
  await setDoc(doc(db, 'matches', matchId),
    { homeScore, awayScore, firstGoalPlayer, status: 'done' }, { merge: true });
}

async function setPayment(userId, matchId, paid) {
  const id = `${userId}_${matchId}_payment`;
  await setDoc(doc(db, 'payments', id), { userId, matchId, paid, updatedAt: serverTimestamp() });
}

// ── Subscriptions ─────────────────────────────────────────────────
function subscribe() {
  onSnapshot(query(collection(db,'matches'), orderBy('date')), s => {
    state.matches = s.docs.map(d => d.data());
    render();
  });
  onSnapshot(collection(db,'scorebets'), s => {
    state.scoreBets = s.docs.map(d => d.data());
    render();
  });
  onSnapshot(collection(db,'firstgoalbets'), s => {
    state.fgBets = s.docs.map(d => d.data());
    render();
  });
  onSnapshot(collection(db,'users'), s => {
    state.users = s.docs.map(d => d.data());
    render();
  });
  onSnapshot(collection(db,'bracketmatches'), s => {
    state.bracketMatches = s.docs.map(d => d.data()).sort((a,b) => a.id.localeCompare(b.id));
    render();
  });
  onSnapshot(collection(db,'bracketpicks'), s => {
    const map = {};
    s.docs.forEach(d => {
      const { userId, matchId, team } = d.data();
      if (!map[userId]) map[userId] = {};
      map[userId][matchId] = team;
    });
    state.brackets = map;
    render();
  });
  onSnapshot(collection(db,'bracketresults'), s => {
    const map = {};
    s.docs.forEach(d => { map[d.data().matchId] = d.data().winner; });
    state.bracketResults = map;
    render();
  });
  onSnapshot(collection(db,'payments'), s => {
    const map = {};
    s.docs.forEach(d => {
      const { userId, matchId, paid } = d.data();
      if (!map[userId]) map[userId] = {};
      map[userId][matchId] = paid;
    });
    state.payments = map;
    render();
  });
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML =
    !state.user ? renderLogin() : renderApp();
  attachEvents();
}

function renderLogin() {
  return `
  <div class="auth-wrap">
    <div class="auth-logo">🇰🇷</div>
    <div class="auth-title">KOREA BET 2026</div>
    <p class="auth-tag">친구들과 한국 경기 스코어 베팅</p>
    <input class="auth-input" id="nameInput" type="text" placeholder="이름 입력 (예: 철수)" maxlength="12" autofocus>
    <div id="authErr" class="auth-err"></div>
    <button class="auth-btn" id="enterBtn">입장하기 →</button>
    <p class="auth-note">같은 이름으로 다시 오면 이어서 사용 가능</p>
  </div>`;
}

function renderApp() {
  return `
  <div class="shell">
    <header class="header">
      <div>
        <div class="logo">🇰🇷 KOREA BET 2026</div>
        <div class="sub">${state.user.name}님</div>
      </div>
      <button class="logout-btn" id="logoutBtn">나가기</button>
    </header>
    <nav class="tabs">
      <div class="tab ${state.tab==='bet'?'on':''}" data-tab="bet"><span class="tab-icon">⚽</span>베팅</div>
      <div class="tab ${state.tab==='bracket'?'on':''}" data-tab="bracket"><span class="tab-icon">🗂️</span>브래킷</div>
      <div class="tab ${state.tab==='rank'?'on':''}" data-tab="rank"><span class="tab-icon">🏆</span>랭킹</div>
    </nav>
    <main class="page">
      ${state.tab==='bet' ? renderBetting() : state.tab==='bracket' ? renderBracket() : renderRank()}
    </main>
  </div>
  <div id="lockWarning" class="lock-toast">🔒 경기 시작! 베팅 변경이 불가합니다</div>
  ${state.confirm ? renderConfirmModal() : ''}`;
}

function renderBetting() {
  return state.matches.map(m => renderMatch(m)).join('');
}

function renderMatch(m) {
  const mSBets  = state.scoreBets.filter(b => b.matchId === m.id);
  const mFgBets = state.fgBets.filter(b => b.matchId === m.id);
  const scorePool = mSBets.length * 10;
  const fgPool    = mFgBets.length * 5;
  const myFg      = mFgBets.find(b => b.userId === state.user.id);
  const isAdmin   = state.user.name === ADMIN_NAME;

  const pillClass = m.status==='live' ? 'pill-live' : m.status==='done' ? 'pill-done' : 'pill-up';
  const pillText  = m.status==='live' ? '🔴 LIVE' : m.status==='done' ? '종료' : '예정';

  // Score grid 5x5
  let grid = `
    <div class="section-title">스코어 그리드 · 블록당 $10</div>
    <div class="grid-wrap">
      <div class="grid-label-row">
        <div class="grid-corner">🇰🇷 \\ ${m.flag}</div>
        ${[0,1,2,3,4].map(a=>`<div class="grid-label">${m.flag}${a}</div>`).join('')}
      </div>
      ${[0,1,2,3,4].map(home => `
        <div class="grid-row">
          <div class="grid-row-label">🇰🇷${home}</div>
          ${[0,1,2,3,4].map(away => {
            const cellBets = mSBets.filter(b => b.home===home && b.away===away);
            const isMine   = cellBets.some(b => b.userId===state.user.id);
            const isWon    = m.status==='done' && m.homeScore===home && m.awayScore===away;
            const isLocked = m.status==='live' || m.status==='done';
            const names    = cellBets.map(b=>b.userName).join(', ');
            let cls = 'cell';
            if (isMine) cls += ' mine';
            else if (cellBets.length > 0) cls += ' taken';
            if (isWon) cls += ' won';
            if (isLocked) cls += ' disabled';
            if (m.status==='live') cls += ' locked';
            const payout = isWon && cellBets.length > 0 ? `<div class="cell-win">+$${Math.floor(scorePool/cellBets.length)}</div>` : '';
            return `<div class="${cls}" data-match="${m.id}" data-home="${home}" data-away="${away}" data-locked="${m.status==='live'?'1':'0'}">
              <div class="cell-score">${home}-${away}</div>
              <div class="cell-names">${names || (!isLocked ? '<span class="cell-price">$10</span>' : '')}</div>
              ${payout}
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>`;

  // First goal
  let fg = `
    <div class="section-title">첫 골 선수 · $5</div>
    <div class="pool-row"><span>첫 골 풀</span><span class="pool-val">$${fgPool} (${mFgBets.length}명)</span></div>
    <div class="fg-grid">
      ${PLAYERS.map(player => {
        const pBets = mFgBets.filter(b => b.player===player);
        const isMine = myFg?.player === player;
        const isWon  = m.status==='done' && m.firstGoalPlayer===player;
        const isDone = m.status==='done';
        let cls = 'fg-btn';
        if (isMine) cls += ' mine';
        if (isDone && !isWon) cls += ' disabled';
        if (isWon) cls += ' won';
        const payout = isWon && pBets.length > 0 ? `<div class="fg-win">+$${Math.floor(fgPool/pBets.length)} 🎉</div>` : '';
        return `<div class="${cls}" data-match="${m.id}" data-player="${player}">
          <div class="fg-name">${player}</div>
          <div class="fg-bets">${pBets.length > 0 ? pBets.map(b=>b.userName).join(', ') : '<span class="fg-price">$5</span>'}</div>
          ${payout}
        </div>`;
      }).join('')}
    </div>`;

  // Admin panel
  let admin = '';
  if (isAdmin && m.status !== 'done') {
    admin = `
    <div class="admin-panel">
      <div class="admin-title">⚙️ 경기 결과 입력 (관리자)</div>
      <div class="admin-row">
        <span class="admin-label">한국</span>
        <input class="mini-input" id="ah_${m.id}" type="number" min="0" placeholder="0">
        <span class="admin-label">:</span>
        <input class="mini-input" id="aa_${m.id}" type="number" min="0" placeholder="0">
        <span class="admin-label">${m.opponent}</span>
      </div>
      <div class="admin-row">
        <span class="admin-label">첫 골</span>
        <select class="mini-select" id="afg_${m.id}">
          <option value="">선수 선택</option>
          ${PLAYERS.map(p=>`<option value="${p}">${p}</option>`).join('')}
          <option value="없음">없음</option>
        </select>
        <button class="mini-btn" data-admin="${m.id}">확정</button>
      </div>
    </div>`;
  }

  // Result banner
  const banner = m.status==='done' ? `
    <div class="result-banner">
      최종: 한국 ${m.homeScore} - ${m.awayScore} ${m.opponent} · 첫 골: ${m.firstGoalPlayer||'없음'}
    </div>` : m.status==='live' ? `
    <div class="lock-banner">
      🔒 경기 시작! 베팅 선택 변경이 불가합니다
    </div>` : '';

  return `
  <div class="match-block">
    <div class="match-header">
      <div>
        <div class="match-title">${m.label} · 🇰🇷 vs ${m.flag}</div>
        <div class="match-date">${m.date} · 한국 vs ${m.opponent}</div>
      </div>
      <span class="pill ${pillClass}">${pillText}</span>
    </div>
    <div class="scoreboard-row">
      <span class="team-flag">🇰🇷</span>
      ${m.homeScore !== null
        ? `<div class="score-big ${m.status==='live'?'live':''}">${m.homeScore} : ${m.awayScore}</div>`
        : `<div class="vs-text">VS</div>`}
      <span class="team-flag">${m.flag}</span>
    </div>
    ${banner}
    <div class="pool-row">
      <span>스코어 풀</span>
      <span class="pool-val">$${scorePool} (${mSBets.length}베팅)</span>
    </div>
    ${admin}
    ${grid}
    ${fg}
  </div>`;
}


function renderBracket() {
  try {
    const isAdmin = state.user.name === ADMIN_NAME;
    const myPicks = state.brackets[state.user.id] || {};
    const results = state.bracketResults || {};
    const allMatches = state.bracketMatches || [];
    const ROUND_INFO = {r32:{label:'32강',pts:1},r16:{label:'16강',pts:2},r8:{label:'8강',pts:3},r4:{label:'4강',pts:4},rf:{label:'결승',pts:5}};

    // My score
    let myScore = 0;
    allMatches.forEach(function(m) {
      var pick = myPicks[m.id], res = results[m.id];
      if (pick && res && pick === res) myScore += (ROUND_INFO[m.round]||{pts:0}).pts;
    });

    var participantCount = Object.keys(state.brackets).length;
    var pool = participantCount * 10;

    var html = '<div class="bracket-hero">'
      + '<div class="bh-left"><div class="bh-title">브래킷 챌린지</div>'
      + '<div class="bh-sub">32강→결승 승자 예측 · 참가비 $10</div></div>'
      + '<div class="bh-right"><div class="bh-pool">$' + pool + '</div>'
      + '<div class="bh-pool-label">총 풀 (' + participantCount + '명)</div></div></div>'
      + '<div class="score-chip">내 점수: <strong>' + myScore + '점</strong></div>';

    ['r32','r16','r8','r4','rf'].forEach(function(roundId) {
      var ri = ROUND_INFO[roundId];
      var roundMatches = allMatches.filter(function(m){ return m.round === roundId; });
      if (!roundMatches.length) return;

      html += '<div class="section-title">' + ri.label + ' · 적중 ' + ri.pts + '점</div>';

      if (isAdmin && roundId !== 'r32') {
        html += '<div class="admin-panel" style="margin-bottom:10px">'
          + '<div class="admin-title">⚙️ ' + ri.label + ' 경기 추가</div>'
          + '<div class="admin-row">'
          + '<input class="mini-input" style="width:80px" id="bh_' + roundId + '" placeholder="홈팀">'
          + '<span class="admin-label">vs</span>'
          + '<input class="mini-input" style="width:80px" id="ba_' + roundId + '" placeholder="원정팀">'
          + '<button class="mini-btn" data-add-round="' + roundId + '">추가</button>'
          + '</div></div>';
      }

      roundMatches.forEach(function(m) {
        var myPick = myPicks[m.id] || '';
        var result = results[m.id] || '';
        var locked = result !== '';
        var homeWon = result === m.home;
        var awayWon = result === m.away;

        var homeNames = Object.entries(state.brackets)
          .filter(function(e){ return e[1][m.id] === m.home; })
          .map(function(e){
            var u = state.users.find(function(u){ return u.id === e[0]; });
            return u ? u.name : e[0];
          }).join(', ');
        var awayNames = Object.entries(state.brackets)
          .filter(function(e){ return e[1][m.id] === m.away; })
          .map(function(e){
            var u = state.users.find(function(u){ return u.id === e[0]; });
            return u ? u.name : e[0];
          }).join(', ');

        var homeCls = 'bm-team' + (myPick===m.home?' picked':'') + (homeWon?' won':'') + (myPick===m.home&&homeWon?' correct':'');
        var awayCls = 'bm-team' + (myPick===m.away?' picked':'') + (awayWon?' won':'') + (myPick===m.away&&awayWon?' correct':'');
        var cur = locked ? 'cursor:default' : 'cursor:pointer';

        html += '<div class="bm-card">'
          + '<div class="bm-teams">'
          + '<div class="' + homeCls + '" data-bpick="' + m.id + '" data-team="' + m.home + '" style="' + cur + '">'
          + '<div class="bm-name">' + m.home + '</div>'
          + '<div class="bm-pickers">' + (homeNames || '<span style="opacity:.3">선택없음</span>') + '</div>'
          + (homeWon ? '<div class="bm-result-tag">✓ 승</div>' : '')
          + (myPick===m.home&&homeWon ? '<div class="bm-score-tag">+' + ri.pts + '점 🎉</div>' : '')
          + '</div>'
          + '<div class="bm-vs">VS</div>'
          + '<div class="' + awayCls + '" data-bpick="' + m.id + '" data-team="' + m.away + '" style="' + cur + '">'
          + '<div class="bm-name">' + m.away + '</div>'
          + '<div class="bm-pickers">' + (awayNames || '<span style="opacity:.3">선택없음</span>') + '</div>'
          + (awayWon ? '<div class="bm-result-tag">✓ 승</div>' : '')
          + (myPick===m.away&&awayWon ? '<div class="bm-score-tag">+' + ri.pts + '점 🎉</div>' : '')
          + '</div>'
          + '</div>';

        if (isAdmin && !locked) {
          html += '<div class="bm-admin-row">'
            + '<span class="admin-label">결과:</span>'
            + '<button class="mini-btn" style="background:var(--card2);color:#fff;border:1px solid var(--border)" data-bresult="' + m.id + '" data-bwinner="' + m.home + '">' + m.home + ' 승</button>'
            + '<button class="mini-btn" style="background:var(--card2);color:#fff;border:1px solid var(--border)" data-bresult="' + m.id + '" data-bwinner="' + m.away + '">' + m.away + ' 승</button>'
            + '</div>';
        }
        html += '</div>';
      });
    });

    return html;
  } catch(e) {
    return '<div class="empty">브래킷 로딩 중 오류: ' + e.message + '</div>';
  }
}

function renderRank() {
  const COLORS = ['#F5A623','#5dc882','#6b8ff5','#e05555','#c47cf5','#5bc8d4'];
  const isAdmin = state.user.name === ADMIN_NAME;

  // Calculate stats per user (including in-progress bets)
  const ranked = state.users.map((u, i) => {
    let pnl = 0, spent = 0, wins = 0, totalBets = 0;
    // Score bets
    state.scoreBets.filter(b => b.userId===u.id).forEach(b => {
      const m = state.matches.find(x => x.id===b.matchId);
      if (!m) return;
      totalBets++; spent += 10;
      if (m.status === 'done') {
        if (b.home===m.homeScore && b.away===m.awayScore) {
          const mSBets = state.scoreBets.filter(x => x.matchId===m.id);
          const scorePool = mSBets.length * 10;
          const w = mSBets.filter(x=>x.home===m.homeScore && x.away===m.awayScore);
          pnl += Math.floor(scorePool/w.length) - 10; wins++;
        } else { pnl -= 10; }
      }
    });
    // First goal bets
    state.fgBets.filter(b => b.userId===u.id).forEach(b => {
      const m = state.matches.find(x => x.id===b.matchId);
      if (!m) return;
      totalBets++; spent += 5;
      if (m.status === 'done') {
        if (b.player===m.firstGoalPlayer) {
          const mFgBets = state.fgBets.filter(x => x.matchId===m.id);
          const fgPool = mFgBets.length * 5;
          const w = mFgBets.filter(x=>x.player===m.firstGoalPlayer);
          pnl += Math.floor(fgPool/w.length) - 5; wins++;
        } else { pnl -= 5; }
      }
    });
    // Payment status per match
    const payInfo = state.matches.map(m => ({
      matchId: m.id, label: m.label,
      paid: !!(state.payments[u.id] && state.payments[u.id][m.id])
    }));
    return { ...u, pnl, spent, wins, totalBets, payInfo, color: COLORS[i%COLORS.length] };
  }).sort((a,b) => b.spent - a.spent || a.name.localeCompare(b.name));

  const me = ranked.find(u => u.id===state.user.id);

  // Rank rows
  const rankRows = ranked.map((u,i) => {
    const payBadges = u.payInfo.map(p => {
      if (isAdmin) {
        return `<button class="pay-btn ${p.paid?'paid':''}" data-uid="${u.id}" data-mid="${p.matchId}">
          ${p.label} ${p.paid?'✓ 입금':'미입금'}
        </button>`;
      }
      return `<span class="pay-badge ${p.paid?'paid':''}">${p.label} ${p.paid?'✓ 입금':'미입금'}</span>`;
    }).join('');

    return `
    <div class="rank-row ${u.id===state.user.id?'me':''}">
      <div class="rank-num ${i<3?'top':''}">${i+1}</div>
      <div class="avatar" style="background:${u.color}">${u.name[0]}</div>
      <div class="rank-info" style="min-width:0">
        <div class="rank-name">${u.name}${u.id===state.user.id?' (나)':''}</div>
        <div class="rank-sub">베팅 ${u.totalBets}건 · 적중 ${u.wins}회 · 지출 $${u.spent}</div>
        <div class="pay-row">${payBadges}</div>
      </div>
      <div class="rank-pnl" style="color:${u.pnl>=0?'#5dc882':'#e05555'};min-width:48px;text-align:right">${u.pnl>=0?'+':''}$${u.pnl}</div>
    </div>`;
  }).join('');

  // Settle rows (only for done matches)
  const settleRows = me ? ranked.filter(u=>u.id!==state.user.id).map(u => {
    const net = me.pnl - u.pnl;
    if (net===0) return '';
    const iReceive = net > 0;
    const amt = Math.abs(Math.floor(net/2));
    return `<div class="settle-row">
      <div>
        <div class="settle-desc">${iReceive ? `${u.name}님 → 나` : `나 → ${u.name}님`}</div>
        <div class="settle-amt">$${amt}</div>
      </div>
      <div class="settle-icon">${iReceive?'💰':'💸'}</div>
    </div>`;
  }).join('') : '';

  return `
    <div class="section-title" style="margin-top:0">참가자 현황 ${isAdmin?'<span style="font-size:10px;color:var(--gold)">(관리자: 입금 확인 클릭)</span>':''}</div>
    ${ranked.length === 0 ? '<div class="empty">아직 참가자가 없어요</div>' : rankRows}
    <div class="section-title">정산 내역 <span style="font-size:10px;color:var(--muted)">(경기 종료 후 업데이트)</span></div>
    ${settleRows || '<div class="empty">경기 종료 후 정산 내역이 표시됩니다</div>'}`;
}

function renderConfirmModal() {
  const c = state.confirm;
  const isPlace = c.type === 'place';
  return `
  <div class="overlay" id="overlayBg">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${isPlace ? '베팅 확인' : '베팅 취소'}</div>
      <div class="modal-sub">
        ${isPlace
          ? `한국 ${c.home} - ${c.away} ${c.awayLabel} 블록에<br><strong>$10</strong> 베팅할까요?`
          : `한국 ${c.home} - ${c.away} 블록 베팅을 취소할까요?`}
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">아니요</button>
        <button class="btn-confirm" id="modalConfirm">
          ${isPlace ? '베팅하기 $10' : '취소하기'}
        </button>
      </div>
    </div>
  </div>`;
}

// ── Bracket helpers ───────────────────────────────────────────────
// BRACKET_ROUNDS defined at top

];

async function initBracketMatches() {
  for (const m of DEFAULT_BRACKET_MATCHES) {
    const snap = await getDoc(doc(db, 'bracketmatches', m.id));
    if (!snap.exists()) await setDoc(doc(db, 'bracketmatches', m.id), m);
  }
}

async function saveBracketPick(matchId, team) {
  const id = `${state.user.id}_${matchId}`;
  await setDoc(doc(db, 'bracketpicks', id), {
    id, userId: state.user.id, userName: state.user.name,
    matchId, team, updatedAt: serverTimestamp()
  });
}

async function setBracketResult(matchId, winner) {
  await setDoc(doc(db, 'bracketresults', matchId), { matchId, winner, updatedAt: serverTimestamp() });
}

async function addBracketMatch(matchData) {
  await setDoc(doc(db, 'bracketmatches', matchData.id), matchData);
}

async function resetCollection(colName) {
  const snap = await getDocs(collection(db, colName));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

async function resetBracketMatches() {
  await resetCollection('bracketmatches');
  await resetCollection('bracketpicks');
  await resetCollection('bracketresults');
  for (const m of DEFAULT_BRACKET_MATCHES) {
    await setDoc(doc(db, 'bracketmatches', m.id), m);
  }
}

async function resetBracketPicks() {
  await resetCollection('bracketpicks');
}

async function resetBracketResults() {
  await resetCollection('bracketresults');
}

// ── Lock warning ──────────────────────────────────────────────────
function showLockWarning() {
  const el = document.getElementById('lockWarning');
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Events ────────────────────────────────────────────────────────
function attachEvents() {
  // Login
  const enterBtn = document.getElementById('enterBtn');
  if (enterBtn) {
    enterBtn.onclick = doLogin;
    document.getElementById('nameInput')?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  }

  // Logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('korbet_user');
    state.user = null; render();
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => { state.tab = el.dataset.tab; render(); });
  });

  // Score grid cells
  document.querySelectorAll('.cell:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.locked === '1') { showLockWarning(); return; }
      const matchId = el.dataset.match;
      const home = parseInt(el.dataset.home);
      const away = parseInt(el.dataset.away);
      const m = state.matches.find(x => x.id===matchId);
      const isMine = state.scoreBets.some(b => b.matchId===matchId && b.userId===state.user.id && b.home===home && b.away===away);
      state.confirm = { type: isMine?'remove':'place', matchId, home, away, awayLabel: m?.flag||'' };
      render();
    });
  });

  // First goal buttons
  document.querySelectorAll('.fg-btn:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.locked === '1') { showLockWarning(); return; }
      const matchId = el.dataset.match;
      const player  = el.dataset.player;
      placeFgBet(matchId, player).catch(console.error);
    });
  });

  // Bracket picks
  document.querySelectorAll('[data-bpick]').forEach(el => {
    el.addEventListener('click', () => {
      const matchId = el.dataset.bpick;
      const team    = el.dataset.team;
      if (!team || !matchId) return;
      // only locked if admin has confirmed a result
      const result = state.bracketResults[matchId];
      if (result) return;
      // optimistic UI update
      if (!state.brackets[state.user.id]) state.brackets[state.user.id] = {};
      state.brackets[state.user.id][matchId] = team;
      render();
      saveBracketPick(matchId, team).catch(console.error);
    });
  });

  // Bracket results (admin)
  document.querySelectorAll('[data-bresult]').forEach(el => {
    el.addEventListener('click', () => {
      const matchId = el.dataset.bresult;
      const winner  = el.dataset.bwinner;
      if (confirm(`${winner} 승리로 확정할까요?`)) {
        setBracketResult(matchId, winner).catch(console.error);
      }
    });
  });

  // Reset buttons (admin)
  document.getElementById('resetMatchesBtn')?.addEventListener('click', async () => {
    if (!confirm('대진표를 새 대진표로 초기화할까요? 기존 픽도 함께 삭제됩니다.')) return;
    document.getElementById('resetMatchesBtn').textContent = '초기화 중...';
    await resetBracketMatches();
    await resetBracketPicks();
    await resetBracketResults();
  });
  document.getElementById('resetPicksBtn')?.addEventListener('click', async () => {
    if (!confirm('모든 사람의 픽을 초기화할까요?')) return;
    document.getElementById('resetPicksBtn').textContent = '초기화 중...';
    await resetBracketPicks();
  });
  document.getElementById('resetResultsBtn')?.addEventListener('click', async () => {
    if (!confirm('경기 결과를 모두 초기화할까요?')) return;
    document.getElementById('resetResultsBtn').textContent = '초기화 중...';
    await resetBracketResults();
  });

  // Add bracket match (admin)
  document.querySelectorAll('[data-add-round]').forEach(el => {
    el.addEventListener('click', () => {
      const roundId = el.dataset.addRound;
      const home = document.getElementById(`bh_${roundId}`)?.value?.trim();
      const away = document.getElementById(`ba_${roundId}`)?.value?.trim();
      if (!home || !away) { alert('두 팀 이름을 입력하세요'); return; }
      const existing = (state.bracketMatches||[]).filter(m=>m.round===roundId);
      const newId = `${roundId}_${existing.length+1}`;
      addBracketMatch({ id:newId, round:roundId, home, away }).catch(console.error);
    });
  });

  // Admin result buttons
  document.querySelectorAll('[data-admin]').forEach(el => {
    el.addEventListener('click', () => {
      const matchId = el.dataset.admin;
      const h  = parseInt(document.getElementById(`ah_${matchId}`)?.value||'');
      const a  = parseInt(document.getElementById(`aa_${matchId}`)?.value||'');
      const fg = document.getElementById(`afg_${matchId}`)?.value||'';
      if (isNaN(h)||isNaN(a)||!fg) { alert('스코어와 첫 골 선수를 모두 입력하세요'); return; }
      setMatchResult(matchId, h, a, fg).catch(console.error);
    });
  });

  // Confirm modal
  document.getElementById('modalCancel')?.addEventListener('click', () => { state.confirm=null; render(); });
  document.getElementById('overlayBg')?.addEventListener('click', e => { if(e.target.id==='overlayBg'){ state.confirm=null; render(); } });
  // Payment toggle (admin only)
  document.querySelectorAll('.pay-btn').forEach(el => {
    el.addEventListener('click', async () => {
      const uid = el.dataset.uid;
      const mid = el.dataset.mid;
      const isPaid = el.classList.contains('paid');
      await setPayment(uid, mid, !isPaid);
    });
  });

  document.getElementById('modalConfirm')?.addEventListener('click', async () => {
    const c = state.confirm;
    if (!c) return;
    document.getElementById('modalConfirm').textContent = '처리 중...';
    document.getElementById('modalConfirm').disabled = true;
    try {
      if (c.type==='place') await placeScoreBet(c.matchId, c.home, c.away);
      else await removeScoreBet(c.matchId, c.home, c.away);
    } finally { state.confirm=null; render(); }
  });
}

async function doLogin() {
  const name = document.getElementById('nameInput')?.value?.trim();
  if (!name) return;
  document.getElementById('enterBtn').textContent = '입장 중...';
  document.getElementById('enterBtn').disabled = true;
  try {
    const u = await loginOrCreate(name);
    localStorage.setItem('korbet_user', JSON.stringify(u));
    state.user = u;
    subscribe();
    render();
  } catch(e) {
    document.getElementById('authErr').textContent = '연결 오류. 다시 시도해주세요';
    document.getElementById('enterBtn').textContent = '입장하기 →';
    document.getElementById('enterBtn').disabled = false;
  }
}

// ── Boot ──────────────────────────────────────────────────────────
async function boot() {
  await initMatches();
  await initBracketMatches();
  const saved = localStorage.getItem('korbet_user');
  if (saved) {
    state.user = JSON.parse(saved);
    subscribe();
  }
  render();
}
boot();
</script>

.auth-input::placeholder{color:rgba(255,255,255,.25)}
.auth-err{font-size:12px;color:var(--red);margin-bottom:6px;min-height:16px}
.auth-btn{background:var(--gold);border:none;border-radius:10px;padding:14px;color:#0D1B2A;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:'Inter',sans-serif;transition:background .2s}
.auth-btn:hover{background:#d98f10}
.auth-btn:disabled{opacity:.4;cursor:not-allowed}
.auth-note{font-size:11px;color:rgba(255,255,255,.2);margin-top:18px;line-height:1.7}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--card2);border-radius:20px 20px 0 0;padding:22px 18px 36px;width:100%;max-width:480px;margin:0 auto;border-top:1px solid var(--bdr)}
.modal-handle{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.modal-sub strong{color:#fff}
.modal-actions{display:grid;grid-template-columns:1fr 2fr;gap:10px}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:13px;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-confirm{background:var(--gold);border:none;border-radius:10px;padding:13px;color:#0D1B2A;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}

.empty{text-align:center;padding:32px 20px;color:rgba(255,255,255,.2);font-size:13px}
.bracket-hero{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.bh-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--gold)}
.bh-sub{font-size:11px;color:var(--muted);margin-top:2px}
.bh-pool{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green);letter-spacing:1px;text-align:right}
.bh-pool-label{font-size:10px;color:var(--muted);text-align:right}
.score-chip{display:inline-block;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--gold);margin-bottom:14px}
.score-chip strong{font-size:15px}
.bm-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.bm-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:stretch}
.bm-team{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;transition:all .2s;position:relative}
.bm-team:hover:not([style*="cursor:default"]){border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05)}
.bm-team.picked{border-color:var(--gold);background:rgba(245,166,35,.1)}
.bm-team.won{border-color:var(--green)}
.bm-team.correct{border-color:var(--green);background:rgba(93,200,130,.12)}
.bm-name{font-size:13px;font-weight:600;margin-bottom:4px}
.bm-pickers{font-size:10px;color:var(--muted);line-height:1.4}
.bm-team.picked .bm-pickers{color:var(--gold)}
.bm-result-tag{font-size:10px;color:var(--green);font-weight:600;margin-top:4px}
.bm-score-tag{font-size:10px;color:var(--gold);font-weight:700;margin-top:2px}
.bm-vs{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(255,255,255,.18);display:flex;align-items:center}
.bm-admin-row{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.reset-btn{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:8px;padding:7px 12px;color:#e05555;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.reset-btn:hover{background:rgba(224,85,85,.2)}
.pay-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.lock-banner{background:rgba(255,100,50,.12);border:1px solid rgba(255,100,50,.35);border-radius:10px;padding:9px 13px;margin-bottom:10px;font-size:13px;color:#ff7a50;text-align:center;font-weight:500}
.lock-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;border:1px solid rgba(255,100,50,.5);color:#ff7a50;font-size:13px;font-weight:500;padding:12px 22px;border-radius:30px;z-index:999;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;white-space:nowrap}
.lock-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.pay-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}
.pay-badge.paid{background:rgba(93,200,130,.12);color:#5dc882;border-color:rgba(93,200,130,.3)}
.pay-btn{font-size:10px;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:'Inter',sans-serif;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15);transition:all .2s}
.pay-btn:hover{border-color:var(--gold);color:var(--gold)}
.pay-btn.paid{background:rgba(93,200,130,.12);color:#5dc882;border-color:rgba(93,200,130,.3)}
.pay-btn.paid:hover{background:rgba(224,85,85,.12);color:#e05555;border-color:rgba(224,85,85,.3)}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:#F5A623">🇰🇷</div>
  </div>
</div>
</body>
</html>
